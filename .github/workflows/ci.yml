name: C++ CI + SonarCloud

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "include/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "sonar-project.properties"
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout repository
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # 2. Install dependencies
      # =========================
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libgtest-dev
          cd /usr/src/googletest
          sudo cmake .
          sudo cmake --build . --target install

      # =========================
      # 3. Install Sonar Build Wrapper
      # Keep the entire extracted folder — the binary needs its .so files
      # =========================
      - name: Install Sonar Build Wrapper
        run: |
          curl -sSLo /tmp/build-wrapper-linux-x86.zip \
            https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip /tmp/build-wrapper-linux-x86.zip -d $HOME
          echo "$HOME/build-wrapper-linux-x86" >> $GITHUB_PATH

      # =========================
      # 4. Configure CMake
      # =========================
      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_CXX_COMPILER=g++

      # =========================
      # 5. Build with Sonar Build Wrapper
      # =========================
      - name: Build with Build Wrapper
        run: |
          build-wrapper-linux-x86-64 --out-dir bw-output \
            cmake --build build --parallel

      # =========================
      # 6. Run tests
      # =========================
      - name: Run tests
        run: ctest --test-dir build --output-on-failure --verbose

      # =========================
      # 7. SonarCloud Analysis
      # =========================
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
            -Dsonar.organization=omarosama16
            -Dsonar.sources=src,include
            -Dsonar.tests=tests
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.cfamily.build-wrapper-output=bw-output
