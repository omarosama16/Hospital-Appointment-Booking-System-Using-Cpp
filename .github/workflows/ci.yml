name: C++ CI + SonarQube Pipeline

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install compiler & tools
      run: sudo apt-get update && sudo apt-get install -y g++ cmake libgtest-dev

    - name: Build Google Test
      run: |
        cd /usr/src/gtest
        sudo cmake .
        sudo make
        sudo cp lib/*.a /usr/lib

    - name: Build main project
      run: |
        g++ src/app/*.cpp src/core/*.cpp -Iinclude -o app

    - name: Build tests
      run: |
        g++ tests/*.cpp \
            src/core/*.cpp \
            -Iinclude \
            -lgtest -lgtest_main -pthread \
            -o tests_runner

    - name: Run tests
      run: timeout 5s ./tests_runner

    # ☁️ SonarCloud Scan
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      continue-on-error: true
      with:
        args: >
          -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
          -Dsonar.organization=omarosama16
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
