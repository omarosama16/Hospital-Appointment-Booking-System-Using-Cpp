name: C++ CI Pipeline + GoogleTest + SonarCloud

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake make git ninja-build


    - name: Install GoogleTest
      run: |
        git clone https://github.com/google/googletest.git
        cd googletest
        cmake -S . -B build
        cmake --build build
        sudo cmake --install build

    - name: Configure project (generate compile_commands.json)
      run: |
        cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Install Sonar Build Wrapper
      run: |
        wget https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
        unzip build-wrapper-linux-x86.zip

    - name: Build with Build Wrapper
      run: |
        mkdir -p bw-output
        ./build-wrapper-linux-x86/build-wrapper-linux-x86-64 \
          --out-dir bw-output \
          cmake --build build


    - name: Run tests
      run: |
        ctest --test-dir build || true


    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
          -Dsonar.organization=omarosama16
          -Dsonar.sources=src
          -Dsonar.tests=tests
          -Dsonar.cfamily.compile-commands=build/compile_commands.json
          -Dsonar.exclusions=build/**,bw-output/**
