name: C++ CI + GoogleTest + SonarCloud

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  build-test-sonar:
    runs-on: ubuntu-latest

    steps:

    # ======================
    # Checkout repo
    # ======================
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # ======================
    # Install dependencies
    # ======================
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake make git

    # ======================
    # Install GoogleTest
    # ======================
    - name: Install GoogleTest
      run: |
        git clone https://github.com/google/googletest.git
        cd googletest
        cmake -S . -B build
        cmake --build build
        sudo cmake --install build

    # ======================
    # Configure CMake
    # ======================
    - name: Configure project
      run: |
        cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    # ======================
    # FIX compile_commands.json (IMPORTANT)
    # ======================
    - name: Fix compile_commands paths
      run: |
        cp build/compile_commands.json .
        sed -i "s|$PWD|.|g" compile_commands.json

    # ======================
    # Build project
    # ======================
    - name: Build project
      run: cmake --build build

    # ======================
    # Run tests
    # ======================
    - name: Run tests
      run: |
        cd build
        ctest --output-on-failure || true

    # ======================
    # SonarCloud Analysis
    # ======================
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
          -Dsonar.organization=omarosama16
          -Dsonar.sources=src
          -Dsonar.tests=tests
          -Dsonar.cfamily.compile-commands=compile_commands.json
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.exclusions=build/**,**/googletest/**
