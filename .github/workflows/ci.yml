name: C++ CI (GoogleTest + SonarCloud)

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0


    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ git wget unzip


    - name: Install GoogleTest
      run: |
        git clone https://github.com/google/googletest.git
        cd googletest
        cmake -S . -B build
        cmake --build build
        sudo cmake --install build


    - name: Build application
      run: |
        mkdir -p build

        g++ $(find src -name "*.cpp") \
            -Iinclude -Isrc/core -Isrc/app \
            -o build/app


    - name: Run app
      run: |
        timeout 3s ./build/app || true


    - name: Build tests
      run: |
        mkdir -p test_build

        g++ $(find tests -name "*.cpp") \
            $(find src -name "*.cpp") \
            -Iinclude -Isrc/core -Isrc/app \
            -lgtest -lgtest_main -pthread \
            -o test_build/tests


    - name: Run tests
      run: |
        ./test_build/tests || true


    - name: Download build wrapper (required for C++)
      run: |
        wget https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
        unzip build-wrapper-linux-x86.zip
        echo "$PWD/build-wrapper-linux-x86" >> $GITHUB_PATH


    - name: Wrapped build for Sonar
      run: |
        mkdir -p bw-output

        build-wrapper-linux-x86/build-wrapper-linux-x86-64 \
          --out-dir bw-output \
          g++ $(find src -name "*.cpp") \
          -Iinclude -Isrc/core -Isrc/app \
          -o build/app


    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
          -Dsonar.organization=omarosama16
          -Dsonar.sources=src
          -Dsonar.tests=tests
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.cfamily.build-wrapper-output=bw-output
          -Dsonar.exclusions=build/**,bw-output/**
