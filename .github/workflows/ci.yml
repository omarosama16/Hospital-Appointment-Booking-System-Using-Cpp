name: C++ CI + SonarCloud Pipeline

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake wget unzip libgtest-dev

    - name: Build Google Test
      run: |
        cd /usr/src/gtest
        sudo cmake .
        sudo make
        sudo cp lib/*.a /usr/lib || true

    - name: Download Build Wrapper
      run: |
        wget https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
        unzip build-wrapper-linux-x86.zip


    - name: Build project with wrapper
      run: |
        mkdir -p build
        cd build
        ../build-wrapper-linux-x86/build-wrapper-linux-x86-64 \
          --out-dir ../bw-output \
          g++ ../src/app/Main.cpp ../src/core/*.cpp -I../include -o app


    - name: Build tests
      run: |
        g++ tests/*.cpp \
            src/core/*.cpp \
            -Iinclude \
            -lgtest -lgtest_main -pthread \
            -o tests_runner

    - name: Run tests
      run: timeout 5s ./tests_runner || true

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      with:
        args: >
          -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
          -Dsonar.organization=omarosama16
          -Dsonar.sources=src
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.cfamily.build-wrapper-output=bw-output
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
