name: C++ CI + SonarCloud

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "include/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "sonar-project.properties"

  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Install build tools
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++

      # 3. Install GoogleTest (FIXED)
      - name: Install GoogleTest
        run: |
          sudo apt-get install -y libgtest-dev cmake
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib

      # 4. Configure project
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # 5. Debug compile database
      - name: Verify compile database
        run: ls -R build

      # 6. Build project
      - name: Build
        run: cmake --build build --parallel

      # 7. Run tests
      - name: Run tests
        run: ctest --test-dir build --output-on-failure --verbose

      # 8. SonarCloud scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
            -Dsonar.organization=omarosama16
            -Dsonar.sources=src,include
            -Dsonar.tests=tests
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
