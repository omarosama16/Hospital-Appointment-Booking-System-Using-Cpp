name: C++ CI + SonarCloud

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "include/**"
      - "tests/**"
      - "CMakeLists.txt"
      - "sonar-project.properties"

  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # 1. Checkout repository
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # 2. Install dependencies
      # =========================
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libgtest-dev

      # =========================
      # 3. Configure project (CMake)
      # =========================
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # =========================
      # 4. Debug build folder (IMPORTANT)
      # =========================
      - name: Verify build artifacts
        run: ls -R build

      # =========================
      # 5. Build project
      # =========================
      - name: Build project
        run: cmake --build build --parallel

      # =========================
      # 6. Run tests
      # =========================
      - name: Run tests
        run: ctest --test-dir build --output-on-failure --verbose

      # =========================
      # 7. SonarCloud Analysis
      # =========================
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
            -Dsonar.organization=omarosama16
            -Dsonar.sources=src,include
            -Dsonar.tests=tests
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
