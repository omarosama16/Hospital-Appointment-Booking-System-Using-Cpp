name: C++ CI Pipeline + SonarCloud

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:


    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0


    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake make git libgtest-dev

    - name: Configure project
      run: |
        cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON


    - name: Build project
      run: |
        cmake --build build

    - name: Build tests
      run: |
        mkdir -p test_build

        g++ \
          $(find src/core -name "*.cpp") \
          $(find tests -name "*.cpp") \
          -Iinclude \
          -lgtest -lgtest_main -pthread \
          -o test_build/tests

    - name: Run tests
      run: |
        ./test_build/tests

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
          -Dsonar.organization=omarosama16
          -Dsonar.sources=src
          -Dsonar.tests=tests
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.cfamily.compile-commands=build/compile_commands.json
