name: C++ CI + SonarCloud Pipeline

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-12 cmake wget unzip libgtest-dev
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-12 100
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 100

      - name: Build GoogleTest
        run: |
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib || true

      - name: Download Build Wrapper
        run: |
          wget https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
          unzip build-wrapper-linux-x86.zip

      - name: Build project (wrapped)
        run: |
          build-wrapper-linux-x86/build-wrapper-linux-x86-64 \
            --out-dir bw-output \
            g++-12 src/app/*.cpp src/core/*.cpp \
                -Iinclude \
                -o app

      - name: Debug compile_commands.json
        run: cat bw-output/compile_commands.json

      - name: Build tests
        run: |
          g++-12 tests/*.cpp \
              src/core/*.cpp \
              -Iinclude \
              -lgtest -lgtest_main -pthread \
              -o tests_runner

      - name: Run tests
        run: timeout 5s ./tests_runner || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
            -Dsonar.organization=omarosama16
            -Dsonar.sources=src
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.cfamily.compile-commands=bw-output/compile_commands.json
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
