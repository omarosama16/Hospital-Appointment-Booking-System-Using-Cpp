name: C++ CI Pipeline + SonarCloud

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:

    # =========================
    # 1. Checkout
    # =========================
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # =========================
    # 2. Install dependencies
    # =========================
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake make git libgtest-dev

    # =========================
    # 3. Configure CMake (IMPORTANT FIX)
    # =========================
    - name: Configure project with CMake
      run: |
        cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    # =========================
    # 4. Build project
    # =========================
    - name: Build project
      run: |
        cmake --build build

    # =========================
    # 5. GoogleTest build (simple + stable)
    # =========================
    - name: Build tests
      run: |
        mkdir -p test_build

        g++ $(find tests -name "*.cpp") \
            $(find src -name "*.cpp") \
            -Iinclude \
            -lgtest -lgtest_main -pthread \
            -o test_build/tests

    - name: Run tests
      run: |
        ./test_build/tests

    # =========================
    # 6. SonarCloud Scan (FIXED)
    # =========================
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
          -Dsonar.organization=omarosama16
          -Dsonar.sources=src
          -Dsonar.tests=tests
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.cfamily.compile-commands=build/compile_commands.json
