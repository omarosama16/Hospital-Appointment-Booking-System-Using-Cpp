name: C++ CI Pipeline + SonarCloud

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0


    - name: Install compiler + tools
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ cmake make git

    - name: Build project
      run: |
        mkdir -p build

        g++ $(find src -name "*.cpp") \
            -Iinclude \
            -o build/app

        echo "Build successful"


    - name: Install GoogleTest
      run: |
        git clone https://github.com/google/googletest.git
        cd googletest
        cmake -S . -B build
        cmake --build build
        sudo cmake --install build

    - name: Build tests
      run: |
        mkdir -p test_build

        g++ $(find tests -name "*.cpp") \
            $(find src -name "*.cpp") \
            -Iinclude \
            -Igoogletest/googletest/include \
            -L/usr/local/lib \
            -lgtest -lgtest_main -pthread \
            -o test_build/tests

    - name: Run tests
      run: |
        ./test_build/tests

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
          -Dsonar.organization=omarosama16
          -Dsonar.sources=src
          -Dsonar.tests=tests
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.cfamily.compile-commands=build
