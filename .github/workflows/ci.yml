name: C++ CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:
      # ================= CHECKOUT =================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ================= DEPENDENCIES =================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake g++ gcovr lcov libgtest-dev

      # ================= BUILD =================
      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage" \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build project
        run: cmake --build build --parallel

      # ================= TEST =================
      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      # ================= COVERAGE (FIXED) =================
      - name: Generate coverage (LCOV → SONAR FORMAT FIXED)
        run: |
          lcov --capture --directory build --output-file coverage.info --ignore-errors mismatch
          lcov --remove coverage.info '/usr/*' '*/tests/*' --output-file coverage.info

      # Convert to XML (Sonar accepts XML better)
      - name: Convert coverage to XML
        run: |
          gcovr -r . --xml-pretty -o coverage.xml

      # ================= SONARCLOUD =================
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
            -Dsonar.organization=omarosama16
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
            -Dsonar.coverageReportPaths=coverage.info