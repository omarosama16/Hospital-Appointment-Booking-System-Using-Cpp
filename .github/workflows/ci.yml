name: C++ CI + GoogleTest + SonarCloud

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:

    # ======================
    # Checkout
    # ======================
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # ======================
    # Install tools
    # ======================
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ make wget unzip git

    # ======================
    # Install GoogleTest
    # ======================
    - name: Install GoogleTest
      run: |
        git clone https://github.com/google/googletest.git
        cd googletest
        cmake -S . -B build
        cmake --build build
        sudo cmake --install build

    # ======================
    # Sonar Build Wrapper
    # ======================
    - name: Install Build Wrapper
      run: |
        wget https://sonarcloud.io/static/cpp/build-wrapper-linux-x86.zip
        unzip build-wrapper-linux-x86.zip
        echo "$PWD/build-wrapper-linux-x86" >> $GITHUB_PATH

    # ======================
    # Build project (WRAPPED)
    # ======================
    - name: Build project
      run: |
        mkdir -p build
        mkdir -p bw-output

        build-wrapper-linux-x86/build-wrapper-linux-x86-64 \
          --out-dir bw-output \
          g++ -std=c++17 \
          $(find src -name "*.cpp") \
          -Iinclude \
          -o build/app

    # ======================
    # Run app (optional)
    # ======================
    - name: Run app
      run: |
        echo "0" | timeout 2s ./build/app || true

    # ======================
    # Build tests
    # ======================
    - name: Build tests
      run: |
        g++ -std=c++17 \
          $(find src -name "*.cpp") \
          $(find tests -name "*.cpp") \
          -Iinclude \
          -lgtest -lgtest_main -pthread \
          -o build/tests

    # ======================
    # Run tests
    # ======================
    - name: Run tests
      run: |
        ./build/tests || true

    # ======================
    # SonarCloud
    # ======================
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
          -Dsonar.organization=omarosama16
          -Dsonar.sources=src
          -Dsonar.tests=tests
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.cfamily.build-wrapper-output=bw-output
          -Dsonar.exclusions=build/**,googletest/**
