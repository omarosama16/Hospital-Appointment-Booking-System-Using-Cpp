name: C++ CI + SonarCloud

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install tools
      run: sudo apt-get update && sudo apt-get install -y cmake g++

    - name: Clean
      run: rm -rf build

    - name: Configure
      run: cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Build
      run: cmake --build build

    - name: Verify compile database
      run: |
        ls -lah build
        cat build/compile_commands.json | head -50

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
          -Dsonar.organization=omarosama16
          -Dsonar.sources=src
          -Dsonar.tests=tests
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.cfamily.compile-commands=build/compile_commands.json
          -Dsonar.exclusions=build/**,**/googletest/**
