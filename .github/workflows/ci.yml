name: C++ CI Pipeline + GoogleTest + SonarCloud

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  build-test-analyze:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0


    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ git cmake make


    - name: Build project
      run: |
        mkdir -p build
        g++ -std=c++17 $(find src -name "*.cpp") -Iinclude -o build/app


    - name: Run app
      run: |
        echo "0" | timeout 3s ./build/app || true


    - name: Build tests
      run: |
        mkdir -p test_build
        g++ -std=c++17 $(find tests -name "*.cpp") $(find src -name "*.cpp") \
            -Iinclude -lgtest -lgtest_main -pthread \
            -o test_build/tests || true


    - name: Run tests
      run: |
        ./test_build/tests || true


    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v2
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=omarosama16_Hospital-Appointment-Booking-System-Using-Cpp
          -Dsonar.organization=omarosama16
          -Dsonar.sources=src
          -Dsonar.tests=tests
          -Dsonar.sourceEncoding=UTF-8
          -Dsonar.exclusions=build/**,test_build/**
